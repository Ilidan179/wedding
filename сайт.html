<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ляйсан & Вильдан</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #f8f5f2;
    color: #5a4a42;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
}

.hero-content {
    position: relative;
    animation: fadeIn 2s ease;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    letter-spacing: 2px;
}

.date {
    margin-top: 20px;
    font-size: 20px;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
}

h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin-bottom: 20px;
}

/* TIMER */
.timer {
    font-size: 42px;
    margin-top: 20px;
}

/* RSVP */
.form-container {
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    background: #b38b6d;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #9c7459;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.fade-up.visible {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Ляйсан & Вильдан</h1>
        <div class="date">18 июля 2026</div>
    </div>
</section>

<!-- INVITE -->
<section class="section fade-up">
    <h2>Мы приглашаем вас 💕</h2>
    <p>Стать частью самого важного дня в нашей жизни</p>
</section>

<!-- TIMER -->
<section class="section fade-up">
    <h2>До свадьбы осталось</h2>
    <div class="timer" id="timer"></div>
</section>

<!-- RSVP -->
<section class="section fade-up">
    <h2>Подтвердите участие</h2>

    <div class="form-container">
        <form action="/submit" method="post">

            <input type="text" name="name" placeholder="Ваше имя" required>

            <select name="attendance">
                <option>Я приду</option>
                <option>Не смогу прийти</option>
            </select>

            <select name="alcohol">
                <option>Буду употреблять алкоголь</option>
                <option>Не буду употреблять</option>
            </select>

            <button type="submit">Отправить</button>

        </form>
    </div>
</section>

<script>
// TIMER
const weddingDate = new Date("Jul 18, 2026 15:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("timer").innerHTML = days + " дней";
}, 1000);

// SCROLL ANIMATION
const elements = document.querySelectorAll('.fade-up');

window.addEventListener('scroll', () => {
    elements.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            el.classList.add('visible');
        }
    });
});
</script>

</body>
</html>
